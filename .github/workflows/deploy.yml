name: Build and deploy Sativa OS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sativa-os-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build, migrate, and deploy Worker
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build static assets
        run: npm run build

      - name: Check Cloudflare deployment secrets
        id: cloudflare-secrets
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN" ] && [ -n "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping Cloudflare deploy because CLOUDFLARE_API_TOKEN and/or CLOUDFLARE_ACCOUNT_ID repository secrets are missing. The build still passed."
          fi

      - name: Apply remote D1 migrations
        if: steps.cloudflare-secrets.outputs.configured == 'true'
        run: npm run db:migrate:remote

      - name: Deploy Cloudflare Worker
        if: steps.cloudflare-secrets.outputs.configured == 'true'
        run: npm run deploy
